<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="chat.png" />
    <title>Sabry Chat</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#8B5CF6",
              secondary: "#6D28D9",
              dark: "#0B0B1F",
              card: "#17172E",
            },
          },
        },
      };
    </script>

    <link rel="stylesheet" href="style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.7/signalr.min.js"></script>
  </head>

  <body class="bg-dark text-white overflow-hidden">
    <!-- JOIN MODAL -->
    <div id="joinModal" class="fixed inset-0 bg-black/70 backdrop-blur-md z-[100] flex items-center justify-center p-4">
      <div class="bg-card w-full max-w-[420px] p-8 rounded-3xl border border-purple-500/20">
        <h1 class="text-3xl font-bold text-center mb-2">Sabry Chat</h1>
        <p class="text-center text-slate-400 mb-8">Join a room</p>

        <input id="userName" placeholder="Username" class="w-full bg-slate-800 p-4 rounded-xl mb-4 outline-none" />
        <input id="chatRoom" placeholder="Room" class="w-full bg-slate-800 p-4 rounded-xl mb-6 outline-none" />

        <button id="joinBtn" class="w-full bg-gradient-to-r from-primary to-secondary p-4 rounded-xl font-semibold">
          Join Chat
        </button>
      </div>
    </div>

    <!-- NOTIFICATION DRAWER -->
    <div id="notificationDrawer" class="fixed top-0 right-0 h-screen w-full max-w-[380px] bg-card border-l border-purple-500/20 translate-x-full transition-all duration-300 z-50">
      <div class="p-5 border-b border-purple-500/20 flex justify-between items-center">
        <h2 class="font-bold text-xl">Notifications</h2>
      </div>
      <button id="closeNotificationBtn" class="absolute top-4 right-4 text-2xl hover:text-red-400">✖</button>
      <div id="notifications" class="p-4 overflow-y-auto h-full pb-32 space-y-3"></div>
    </div>

    <!-- MAIN APP -->
    <div class="h-screen flex flex-col lg:flex-row overflow-hidden">
      <!-- SIDEBAR -->
      <aside id="sidebar" class="w-full lg:w-72 bg-card border-r border-purple-500/20 flex flex-col h-full fixed lg:static inset-y-0 left-0 z-40 -translate-x-full lg:translate-x-0 transition-transform duration-300">
        <div class="p-6 border-b border-purple-500/20 flex items-center justify-between">
          <div>
            <h2 class="text-2xl font-bold">Sabry Chat</h2>
            <p id="roomInfo" class="text-slate-400 mt-1 text-sm">Room</p>
          </div>
          <button id="closeSidebarBtn" class="lg:hidden text-2xl text-slate-400 hover:text-white">✕</button>
        </div>

        <div class="flex-1 overflow-y-auto p-4"></div>

        <div class="mt-auto p-5 border-t border-purple-500/20">
          <a href="https://github.com/sabry-learner" target="_blank" class="group flex items-center gap-3 p-3 rounded-xl bg-white/5 hover:bg-purple-500/20 transition-all duration-300">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16" class="text-white group-hover:scale-110 transition">
              <path d="M8 0C3.58 0 0 3.58 0 8a8.013 8.013 0 0 0 5.47 7.59c.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13 -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.5-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.56 7.56 0 0 1 4 0c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
            </svg>
            <div>
              <p class="font-semibold text-white">Ahmed Sabry</p>
              <p class="text-xs text-slate-400">GitHub Profile</p>
            </div>
          </a>
          <p class="text-center text-xs text-slate-500 mt-4">Made with ❤️ by Sabry</p>
        </div>
      </aside>

      <!-- CHAT AREA -->
      <div class="flex-1 flex flex-col h-full min-h-0">
        <header class="h-16 lg:h-20 bg-card border-b border-purple-500/20 flex items-center px-4 lg:px-8">
          <div class="flex items-center justify-between w-full">
            <button id="hamburgerBtn" class="lg:hidden text-3xl mr-4">☰</button>
            
            <div class="flex items-center gap-3">
              <h1 class="font-bold text-lg lg:text-xl">Live Chat</h1>
              <span class="text-green-400 text-xs lg:text-sm bg-green-500/10 px-2.5 py-1 rounded-lg">Connected</span>
            </div>

            <div class="hidden md:flex items-center gap-3">
              <div id="navOnlineUsers" class="flex -space-x-2"></div>
              <span id="navOnlineCount" class="text-sm text-green-400 bg-green-500/10 px-3 py-1 rounded-lg">0 online</span>
            </div>

            <div class="flex items-center gap-4">
              <button id="notificationBtn" class="relative text-2xl p-2">🔔
                <span id="notificationBadge" class="hidden absolute -top-1 -right-1 bg-red-500 w-5 h-5 rounded-full text-xs flex items-center justify-center">0</span>
              </button>
              <button id="leaveBtn" class="border border-white/70 px-4 py-2 rounded-xl hover:bg-red-500/20 transition text-sm lg:text-base">Leave</button>
            </div>
          </div>
        </header>

        <div id="messages" class="flex-1 overflow-y-auto p-4 lg:p-8 space-y-6"></div>

        <div class="p-4 lg:p-5 bg-card border-t border-purple-500/20">
          <div class="flex gap-2">
            <input id="messageInput" placeholder="Type your message..." class="flex-1 bg-slate-900 rounded-3xl px-5 py-4 outline-none text-base" />
            <button id="sendBtn" class="bg-gradient-to-r from-primary to-secondary px-8 lg:px-10 rounded-3xl font-semibold whitespace-nowrap">Send <span class="hidden sm:inline">➤</span></button>
          </div>
        </div>
      </div>
    </div>

    <audio id="notifySound" src="notify.mp3" preload="auto"></audio>

    <script src="app.js"></script>

    <script>
      // Mobile Sidebar Toggle
      document.getElementById('hamburgerBtn').addEventListener('click', () => {
        document.getElementById('sidebar').classList.remove('-translate-x-full');
      });
      document.getElementById('closeSidebarBtn').addEventListener('click', () => {
        document.getElementById('sidebar').classList.add('-translate-x-full');
      });
    </script>
  </body>
</html>
